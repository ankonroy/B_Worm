<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications - Book Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .notification-item {
            transition: background-color 0.2s;
            border-left: 4px solid transparent;
        }
        .notification-item:hover {
            background-color: #f8f9fa;
        }
        .notification-item.unread {
            border-left-color: #0d6efd;
            background-color: #f0f7ff;
        }
        .notification-item.unread:hover {
            background-color: #e6f0ff;
        }
        .notification-time {
            font-size: 0.8rem;
        }
        .badge-count {
            font-size: 0.9rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-bell"></i> Notifications 
                <span class="badge bg-primary badge-count" th:text="${unreadCount}">0</span>
            </h2>
            <div>
                <form th:action="@{/notifications/read-all}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-primary" 
                            th:if="${notifications != null and !notifications.isEmpty()}">
                        <i class="bi bi-check-all"></i> Mark All Read
                    </button>
                </form>
                <a href="/books" class="btn btn-outline-secondary ms-2">
                    <i class="bi bi-arrow-left"></i> Back to Books
                </a>
            </div>
        </div>

        <!-- No notifications message -->
        <div th:if="${notifications == null or notifications.isEmpty()}" class="text-center py-5">
            <i class="bi bi-bell-slash" style="font-size: 4rem; color: #ccc;"></i>
            <h4 class="mt-3 text-muted">No notifications</h4>
            <p class="text-muted">When you receive notifications, they'll appear here.</p>
            <a href="/books" class="btn btn-primary mt-3">
                <i class="bi bi-bookshelf"></i> Browse Books
            </a>
        </div>

        <!-- Notifications list -->
        <div th:if="${notifications != null and !notifications.isEmpty()}" class="list-group">
            <div th:each="notification : ${notifications}" 
                 class="list-group-item notification-item d-flex justify-content-between align-items-start"
                 th:classappend="${!notification.read} ? 'unread' : ''">
                
                <div class="flex-grow-1">
                    <div class="d-flex w-100 justify-content-between">
                        <h6 class="mb-1" th:text="${notification.message}">Notification message</h6>
                        <small class="text-muted notification-time" 
                               th:text="${#temporals.format(notification.createdAt, 'MMM dd, HH:mm')}">
                            Jan 01, 12:00
                        </small>
                    </div>
                    
                    <!-- Link to related book if available -->
                    <div class="mt-2 d-flex justify-content-between align-items-center">
                        <a th:if="${notification.bookId != null}" 
                           th:href="@{'/books/' + ${notification.bookId}}" 
                           class="small text-decoration-none">
                            <i class="bi bi-book"></i> View Book
                        </a>
                        
                        <!-- Mark as read button for unread notifications -->
                        <form th:if="${!notification.read}" 
                              th:action="@{'/notifications/' + ${notification.notificationId} + '/read'}" 
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-check"></i> Mark Read
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
