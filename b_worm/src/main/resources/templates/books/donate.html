<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Donate Book - Book Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .donate-card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .donate-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 1.5rem;
        }
        .donate-header h4 {
            margin: 0;
            font-weight: 600;
        }
        .donate-body {
            padding: 2rem;
        }
        .form-label {
            font-weight: 500;
            color: #555;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e1e5e9;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.1);
        }
        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.3);
        }
        .btn-secondary {
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
        }
        .text-danger {
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card donate-card">
                    <div class="donate-header">
                        <h4><i class="bi bi-gift-fill"></i> Donate a Book</h4>
                        <p class="mb-0 small opacity-75">Share your books with the community</p>
                    </div>
                    <div class="donate-body">
                        <form th:action="@{/books/donate}" th:object="${bookRequest}" method="post">
                            <div class="mb-4">
                                <label class="form-label">
                                    <i class="bi bi-book"></i> Title <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{title}" class="form-control" placeholder="Enter book title" required>
                                <div th:errors="*{title}" class="text-danger"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">
                                    <i class="bi bi-person"></i> Author
                                </label>
                                <input type="text" th:field="*{author}" class="form-control" placeholder="Enter author name">
                                <div th:errors="*{author}" class="text-danger"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">
                                    <i class="bi bi-upc-scan"></i> ISBN
                                </label>
                                <input type="text" th:field="*{isbn}" class="form-control" placeholder="Enter ISBN (optional)">
                                <div th:errors="*{isbn}" class="text-danger"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">
                                    <i class="bi bi-tag"></i> Condition
                                </label>
                                <select th:field="*{condition}" class="form-select">
                                    <option value="">Select condition</option>
                                    <option value="NEW">📦 New</option>
                                    <option value="LIKE_NEW">✨ Like New</option>
                                    <option value="GOOD">👍 Good</option>
                                    <option value="ACCEPTABLE">🆗 Acceptable</option>
                                    <option value="POOR">📉 Poor</option>
                                </select>
                                <div th:errors="*{condition}" class="text-danger"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">
                                    <i class="bi bi-text-paragraph"></i> Description
                                </label>
                                <textarea th:field="*{description}" class="form-control" rows="4" 
                                          placeholder="Tell us about the book..."></textarea>
                                <div th:errors="*{description}" class="text-danger"></div>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mt-5">
                                <a th:href="@{/books}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-gift"></i> Donate Book
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Back to books link -->
                <div class="text-center mt-4">
                    <a href="/books" class="text-decoration-none text-muted">
                        <i class="bi bi-arrow-left"></i> Back to Books
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
