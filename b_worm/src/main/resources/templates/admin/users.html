<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid px-4">
        <h1 class="mt-4">Manage Users</h1>
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">All Users</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}">ID</td>
                                <td th:text="${user.username}">Username</td>
                                <td th:text="${user.email}">Email</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${user.role}">Role</span>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                                    <span th:unless="${user.enabled}" class="badge bg-danger">Disabled</span>
                                </td>
                                <td th:text="${#temporals.format(user.createdAt, 'MMM dd')}">Date</td>
                                <td>
                                    <div th:unless="${user.enabled}">
                                        <form th:action="@{'/admin/users/' + ${user.userId} + '/enable'}" method="post" class="d-inline">
                                            <button class="btn btn-sm btn-success">Enable</button>
                                        </form>
                                    </div>
                                    <div th:if="${user.enabled}">
                                        <form th:action="@{'/admin/users/' + ${user.userId} + '/disable'}" method="post" class="d-inline">
                                            <button class="btn btn-sm btn-danger">Disable</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
