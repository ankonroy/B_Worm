<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - Book Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- This template will be inserted into the layout -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-body text-center p-5">
                        <i class="bi bi-book-half" style="font-size: 4rem; color: #667eea;"></i>
                        <h2 class="mt-3">Welcome to Book Exchange!</h2>
                        <p class="lead">You have successfully logged in.</p>
                        <div class="mt-4">
                            <a href="/books" class="btn btn-primary btn-lg me-2">
                                <i class="bi bi-bookshelf"></i> Browse Books
                            </a>
                            <a href="/books/donate" class="btn btn-success btn-lg">
                                <i class="bi bi-gift"></i> Donate a Book
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
