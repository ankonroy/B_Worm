<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        .invalid-feedback {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .alert-danger {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .alert-success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .demo-credentials {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        .demo-btn {
            padding: 8px 15px;
            margin: 5px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .demo-btn:hover {
            background: #667eea;
            color: white;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e1e1e1;
        }
        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
        .back-home {
            text-align: center;
            margin-top: 15px;
        }
        .back-home a {
            color: #666;
            text-decoration: none;
        }
        .back-home a:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card">
                    <div class="login-header">
                        <h2>📚 Welcome Back!</h2>
                        <p>Sign in to continue your reading journey</p>
                    </div>

                    <!-- Error Message -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <strong>Login Failed!</strong> Invalid username or password
                    </div>

                    <!-- Logout Message -->
                    <div th:if="${param.logout}" class="alert alert-success">
                        <i class="bi bi-check-circle-fill"></i>
                        <strong>Logged out successfully!</strong>
                    </div>

                    <!-- Registration Success Message -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        <i class="bi bi-check-circle-fill"></i>
                        <strong>Registration successful!</strong> Please login with your credentials.
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/auth/login}" method="post" id="loginForm">
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" 
                                   class="form-control" 
                                   name="username" 
                                   id="username"
                                   placeholder="Enter your username"
                                   required>
                            <div class="invalid-feedback" id="usernameError"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" 
                                   class="form-control" 
                                   name="password" 
                                   id="password"
                                   placeholder="Enter your password"
                                   required>
                            <div class="invalid-feedback" id="passwordError"></div>
                        </div>

                        <button type="submit" class="btn-login" id="loginButton">
                            <span id="buttonText">Login</span>
                            <span id="buttonSpinner" style="display: none;">
                                <span class="spinner-border spinner-border-sm" role="status"></span>
                                Logging in...
                            </span>
                        </button>
                    </form>

                    <!-- Demo Credentials -->
                    <div class="demo-credentials">
                        <p><strong>Demo Credentials</strong></p>
                        <button type="button" class="demo-btn" onclick="fillCredentials('admin', 'admin123')">
                            Admin
                        </button>
                        <button type="button" class="demo-btn" onclick="fillCredentials('member1', 'password123')">
                            Member 1
                        </button>
                        <button type="button" class="demo-btn" onclick="fillCredentials('member2', 'password123')">
                            Member 2
                        </button>
                    </div>

                    <!-- Sign Up Link -->
                    <div class="signup-link">
                        <p>Don't have an account? <a th:href="@{/auth/register}">Sign up here</a></p>
                    </div>

                    <!-- Back to Home -->
                    <div class="back-home">
                        <a th:href="@{/}"><i class="bi bi-arrow-left"></i> Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            let isValid = true;

            // Reset errors
            document.getElementById('username').classList.remove('is-invalid');
            document.getElementById('password').classList.remove('is-invalid');

            if (!username) {
                document.getElementById('username').classList.add('is-invalid');
                document.getElementById('usernameError').textContent = 'Username is required';
                isValid = false;
            }

            if (!password) {
                document.getElementById('password').classList.add('is-invalid');
                document.getElementById('passwordError').textContent = 'Password is required';
                isValid = false;
            }

            if (!isValid) {
                e.preventDefault();
                return;
            }

            // Show loading spinner
            document.getElementById('loginButton').disabled = true;
            document.getElementById('buttonText').style.display = 'none';
            document.getElementById('buttonSpinner').style.display = 'inline-block';
        });
    </script>
</body>
</html>
